<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1100">
  <title>React Artifact</title>
  <style>
    *,
    :after,
    :before {
      box-sizing: border-box;
      border: 0 solid #e5e7eb;
    }

    html {
      line-height: 1.5;
      -webkit-text-size-adjust: 100%;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }

    body {
      margin: 0;
      line-height: inherit;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">


  <style id="perf-keep-leaves">
    /* Perf hints - does NOT touch leaves or transitions */
    #aesthetic-root,
    .bg-layer,
    #leaves-canvas {
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    .content {
      contain: layout style;
    }

    /* Make leaf hints use content-visibility */
    .leaf-hint {
      content-visibility: auto;
    }
  </style>
  <script>
    // Defer non-critical work, keep leaves intact
    (function () {
      // Lazy load spotify iframe only when aesthetic visible
      // Keep original behavior but defer
      var orig = document.createElement('link');
      orig.rel = 'preconnect';
      orig.href = 'https://open.spotify.com';
      document.head.appendChild(orig);
    })();
  </script>
